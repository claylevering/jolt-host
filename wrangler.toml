name = "jolt-host"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".output/public"

# ── D1 database ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "jolt-host-db"
database_id = "REPLACE_WITH_YOUR_DATABASE_ID"

# ── R2 object storage ───────────────────────────────────────
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "jolt-host-storage"
